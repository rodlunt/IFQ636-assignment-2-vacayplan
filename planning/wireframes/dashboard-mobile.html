<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<title>Wireframe - Dashboard (Mobile)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; color: #333; width: 390px; }
  .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }

  nav { background: #fff; border-bottom: 1px solid #ddd; height: 52px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { width: 100px; height: 24px; background: #bbb; border-radius: 4px; }
  .nav-avatar { width: 32px; height: 32px; background: #bbb; border-radius: 50%; }
  .hamburger { width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; }
  .hamburger span { height: 2px; background: #aaa; border-radius: 2px; }

  .page { padding: 20px 16px; }

  .greeting-title { width: 220px; height: 24px; background: #ccc; border-radius: 4px; margin-bottom: 6px; }
  .greeting-sub { width: 140px; height: 14px; background: #ddd; border-radius: 3px; }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
  .stat-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 14px; }
  .stat-icon { width: 28px; height: 28px; background: #ddd; border-radius: 6px; margin-bottom: 10px; }
  .stat-value { width: 40px; height: 22px; background: #bbb; border-radius: 4px; margin-bottom: 5px; }
  .stat-label { width: 80px; height: 12px; background: #ddd; border-radius: 3px; margin-bottom: 3px; }
  .stat-sub { width: 64px; height: 10px; background: #e8e8e8; border-radius: 3px; }

  .upcoming { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 14px; margin-bottom: 20px; }
  .section-heading { width: 140px; height: 16px; background: #bbb; border-radius: 4px; margin-bottom: 12px; }
  .upcoming-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee; }
  .upcoming-dest { width: 100px; height: 13px; background: #ccc; border-radius: 3px; }
  .upcoming-badge { width: 52px; height: 18px; background: #ddd; border-radius: 10px; margin-left: auto; }

  .section-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-title { width: 64px; height: 18px; background: #bbb; border-radius: 4px; }
  .add-btn { width: 80px; height: 30px; background: #aaa; border-radius: 6px; }

  .trip-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
  .trip-cover { height: 100px; background: #ccc; }
  .trip-body { padding: 12px; }
  .trip-name { width: 160px; height: 16px; background: #bbb; border-radius: 4px; margin-bottom: 7px; }
  .trip-dates { width: 110px; height: 12px; background: #ddd; border-radius: 3px; margin-bottom: 6px; }
  .trip-badge { width: 56px; height: 18px; background: #ddd; border-radius: 10px; }

  .addition-wrap { position: relative; border: 2px solid #c0392b; border-radius: 5px; padding: 8px; margin-bottom: 12px; }
  .addition-tag { position: absolute; top: -10px; left: 8px; background: #c0392b; color: #fff; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; padding: 1px 6px; border-radius: 3px; text-transform: uppercase; }
  .annotation-text { font-size: 10px; color: #c0392b; font-style: italic; line-height: 1.4; }
  .wf-label { position: fixed; top: 6px; right: 8px; font-size: 9px; color: #bbb; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>

<div class="wf-label">Wireframe — Dashboard (Mobile 390px)</div>

<nav>
  <div class="nav-logo"></div>
  <div style="display:flex;gap:10px;align-items:center;">
    <div class="nav-avatar"></div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</nav>

<div class="page">

  <div style="margin-bottom:20px;">
    <div class="label" style="margin-bottom:5px;">Greeting</div>
    <div class="greeting-title"></div>
    <div class="greeting-sub"></div>
  </div>

  <div class="label" style="margin-bottom:6px;">Stats (2-col grid)</div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon"></div>
      <div class="stat-value"></div>
      <div class="stat-label"></div>
      <div class="stat-sub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"></div>
      <div class="stat-value"></div>
      <div class="stat-label"></div>
      <div class="stat-sub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"></div>
      <div class="stat-value"></div>
      <div class="stat-label"></div>
      <div class="stat-sub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"></div>
      <div class="stat-value"></div>
      <div class="stat-label"></div>
      <div class="stat-sub"></div>
    </div>
  </div>

  <div class="label" style="margin-bottom:6px;">Upcoming departures</div>
  <div class="upcoming">
    <div class="section-heading"></div>
    <div class="upcoming-row">
      <div class="upcoming-dest"></div>
      <div class="upcoming-badge"></div>
    </div>
    <div class="upcoming-row">
      <div class="upcoming-dest" style="width:80px;"></div>
      <div class="upcoming-badge"></div>
    </div>
  </div>

  <div class="section-title-row">
    <div>
      <div class="label" style="margin-bottom:4px;">Trips (single col)</div>
      <div class="section-title"></div>
    </div>
    <div class="add-btn"></div>
  </div>
  <div class="addition-wrap">
    <div class="addition-tag">Addition</div>
    <div class="annotation-text">Status badge reflects trip lifecycle<br>(State pattern: planning / active / completed)</div>
  </div>
  <div class="trip-card">
    <div class="trip-cover"></div>
    <div class="trip-body">
      <div class="trip-name"></div>
      <div class="trip-dates"></div>
      <div class="trip-badge"></div>
    </div>
  </div>
  <div class="trip-card">
    <div class="trip-cover"></div>
    <div class="trip-body">
      <div class="trip-name"></div>
      <div class="trip-dates"></div>
      <div class="trip-badge"></div>
    </div>
  </div>

</div>
</body>
</html>
