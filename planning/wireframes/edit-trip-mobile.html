<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<title>Wireframe - Edit Trip (Mobile)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; color: #333; width: 390px; }
  .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }

  nav { background: #fff; border-bottom: 1px solid #ddd; height: 52px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { width: 100px; height: 24px; background: #bbb; border-radius: 4px; }
  .nav-avatar { width: 32px; height: 32px; background: #bbb; border-radius: 50%; }

  .page { padding: 16px; }

  .breadcrumb { display: flex; gap: 6px; align-items: center; margin-bottom: 16px; }
  .bc-item { width: 60px; height: 12px; background: #ddd; border-radius: 3px; }
  .bc-sep { width: 6px; height: 12px; background: #e8e8e8; border-radius: 2px; }

  .page-title { width: 120px; height: 26px; background: #bbb; border-radius: 4px; margin-bottom: 20px; }

  .cover-card { background: #ccc; border-radius: 10px; height: 160px; position: relative; margin-bottom: 14px; }
  .cover-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px; border-radius: 0 0 10px 10px; }
  .cover-title { width: 130px; height: 20px; background: rgba(255,255,255,0.4); border-radius: 4px; margin-bottom: 5px; }
  .cover-badge { width: 60px; height: 20px; background: rgba(255,255,255,0.45); border-radius: 10px; }

  .form-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
  .form-heading { width: 100px; height: 20px; background: #bbb; border-radius: 4px; margin-bottom: 16px; }
  .field-label { width: 70px; height: 11px; background: #ccc; border-radius: 3px; margin-bottom: 5px; }
  .field-input { width: 100%; height: 36px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 14px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-row-inner { margin-bottom: 14px; }
  .field-select { width: 100%; height: 36px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 14px; }
  .field-textarea { width: 100%; height: 70px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 14px; }

  .addition-wrap { position: relative; border: 2px solid #c0392b; border-radius: 5px; padding: 8px; margin-bottom: 12px; }
  .addition-tag { position: absolute; top: -10px; left: 8px; background: #c0392b; color: #fff; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; padding: 1px 6px; border-radius: 3px; text-transform: uppercase; }
  .annotation-text { font-size: 10px; color: #c0392b; font-style: italic; line-height: 1.4; }

  .form-footer { display: flex; flex-direction: column; gap: 8px; padding-top: 14px; border-top: 1px solid #eee; }
  .hint-text { width: 180px; height: 11px; background: #e0e0e0; border-radius: 3px; }
  .btn-group { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-secondary { width: 70px; height: 34px; background: #ddd; border-radius: 6px; }
  .btn-primary { width: 100px; height: 34px; background: #aaa; border-radius: 6px; }

  .danger-card { background: #fff; border: 1px solid #f0c0c0; border-radius: 10px; padding: 14px; }
  .danger-heading { width: 80px; height: 13px; background: #e0b0b0; border-radius: 3px; margin-bottom: 8px; }
  .danger-text { width: 200px; height: 11px; background: #f0d0d0; border-radius: 3px; margin-bottom: 10px; }
  .danger-btn { width: 90px; height: 30px; background: #e0b0b0; border-radius: 6px; }

  .wf-label { position: fixed; top: 6px; right: 8px; font-size: 9px; color: #bbb; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="wf-label">Wireframe — Edit Trip (Mobile 390px)</div>

<nav>
  <div class="nav-logo"></div>
  <div class="nav-avatar"></div>
</nav>

<div class="page">
  <div class="breadcrumb">
    <div class="bc-item"></div>
    <div class="bc-sep"></div>
    <div class="bc-item" style="width:90px;"></div>
  </div>

  <div class="page-title"></div>

  <div class="label" style="margin-bottom:5px;">Cover preview</div>
  <div class="cover-card">
    <div class="cover-overlay">
      <div class="cover-title"></div>
      <div class="cover-badge"></div>
    </div>
  </div>

  <div class="label" style="margin-bottom:5px;">Edit form (stacked)</div>
  <div class="form-card">
    <div class="form-heading"></div>

    <div class="field-label"></div>
    <div class="field-input"></div>

    <div class="field-row">
      <div class="field-row-inner">
        <div class="field-label" style="width:56px;"></div>
        <div class="field-input" style="margin-bottom:0;"></div>
      </div>
      <div class="field-row-inner">
        <div class="field-label" style="width:48px;"></div>
        <div class="field-input" style="margin-bottom:0;"></div>
      </div>
    </div>

    <div style="height:14px;"></div>
    <div class="field-row">
      <div class="field-row-inner">
        <div class="field-label" style="width:60px;"></div>
        <div class="field-input" style="margin-bottom:0;"></div>
      </div>
      <div class="field-row-inner">
        <div class="addition-wrap">
          <div class="addition-tag">Addition</div>
          <div class="annotation-text">Status now saved<br>(State pattern)</div>
        </div>
        <div class="field-select"></div>
      </div>
    </div>

    <div class="field-label" style="width:42px;"></div>
    <div class="field-textarea"></div>

    <div class="form-footer">
      <div class="hint-text"></div>
      <div class="btn-group">
        <div class="btn-secondary"></div>
        <div class="btn-primary"></div>
      </div>
    </div>
  </div>

  <div class="label" style="margin-bottom:5px;">Danger zone</div>
  <div class="danger-card">
    <div class="danger-heading"></div>
    <div class="danger-text"></div>
    <div class="danger-btn"></div>
  </div>
</div>
</body>
</html>
