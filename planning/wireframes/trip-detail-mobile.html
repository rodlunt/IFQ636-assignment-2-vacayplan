<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<title>Wireframe - Trip Detail (Mobile)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; color: #333; width: 390px; }
  .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }

  nav { background: #fff; border-bottom: 1px solid #ddd; height: 52px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { width: 100px; height: 24px; background: #bbb; border-radius: 4px; }
  .nav-avatar { width: 32px; height: 32px; background: #bbb; border-radius: 50%; }

  .page { padding: 16px; }

  .breadcrumb { display: flex; gap: 6px; align-items: center; margin-bottom: 16px; }
  .bc-item { width: 60px; height: 12px; background: #ddd; border-radius: 3px; }
  .bc-sep { width: 6px; height: 12px; background: #e8e8e8; border-radius: 2px; }

  .hero { background: #ccc; border-radius: 10px; height: 160px; position: relative; margin-bottom: 14px; }
  .hero-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px; border-radius: 0 0 10px 10px; }
  .hero-title { width: 160px; height: 24px; background: rgba(255,255,255,0.4); border-radius: 4px; margin-bottom: 8px; }
  .hero-actions { display: flex; gap: 8px; }
  .hero-btn { width: 64px; height: 28px; background: rgba(255,255,255,0.5); border-radius: 6px; }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-pill { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
  .stat-icon { width: 24px; height: 24px; background: #ddd; border-radius: 6px; flex-shrink: 0; }
  .stat-val { width: 40px; height: 14px; background: #bbb; border-radius: 3px; margin-bottom: 3px; }
  .stat-lbl { width: 60px; height: 10px; background: #ddd; border-radius: 3px; }

  .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 16px; }
  .tab { flex: 1; height: 32px; background: #e8e8e8; border-radius: 6px 6px 0 0; margin-right: 3px; }
  .tab.active { background: #bbb; }

  .day-label { width: 70px; height: 13px; background: #ccc; border-radius: 3px; margin-bottom: 8px; }
  .activity-item { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .act-icon { width: 28px; height: 28px; background: #ddd; border-radius: 6px; flex-shrink: 0; }
  .act-name { width: 120px; height: 13px; background: #bbb; border-radius: 3px; margin-bottom: 4px; }
  .act-time { width: 80px; height: 11px; background: #ddd; border-radius: 3px; }
  .act-btn { width: 24px; height: 24px; background: #e8e8e8; border-radius: 5px; margin-left: auto; }

  .card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .card-heading { width: 90px; height: 13px; background: #bbb; border-radius: 3px; margin-bottom: 12px; }
  .info-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f0f0f0; }
  .info-key { width: 56px; height: 11px; background: #ddd; border-radius: 3px; }
  .info-val { width: 70px; height: 11px; background: #ccc; border-radius: 3px; }
  .status-badge { width: 64px; height: 20px; background: #ddd; border-radius: 10px; }

  .weather-toggle { display: flex; justify-content: space-between; align-items: center; }
  .weather-title { width: 110px; height: 13px; background: #bbb; border-radius: 3px; }
  .chevron { width: 18px; height: 18px; background: #ddd; border-radius: 4px; }
  .weather-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f5f5f5; margin-top: 10px; }
  .wr-date { width: 50px; height: 11px; background: #e0e0e0; border-radius: 3px; }
  .wr-summary { width: 80px; height: 11px; background: #ddd; border-radius: 3px; }
  .wr-temp { width: 48px; height: 11px; background: #ccc; border-radius: 3px; }

  .budget-bar-bg { height: 7px; background: #e8e8e8; border-radius: 4px; margin: 10px 0 8px; }
  .budget-bar-fill { height: 7px; width: 55%; background: #bbb; border-radius: 4px; }

  .addition-wrap { position: relative; border: 2px solid #c0392b; border-radius: 5px; padding: 8px; margin-bottom: 12px; }
  .addition-tag { position: absolute; top: -10px; left: 8px; background: #c0392b; color: #fff; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; padding: 1px 6px; border-radius: 3px; text-transform: uppercase; }
  .annotation-text { font-size: 10px; color: #c0392b; font-style: italic; line-height: 1.4; }
  .wf-label { position: fixed; top: 6px; right: 8px; font-size: 9px; color: #bbb; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="wf-label">Wireframe — Trip Detail (Mobile 390px)</div>

<nav>
  <div class="nav-logo"></div>
  <div class="nav-avatar"></div>
</nav>

<div class="page">
  <div class="breadcrumb">
    <div class="bc-item"></div>
    <div class="bc-sep"></div>
    <div class="bc-item" style="width:90px;"></div>
  </div>

  <div class="label" style="margin-bottom:5px;">Hero cover</div>
  <div class="hero">
    <div class="hero-overlay">
      <div class="hero-title"></div>
      <div class="hero-actions">
        <div class="hero-btn"></div>
        <div class="hero-btn"></div>
      </div>
    </div>
  </div>

  <div class="label" style="margin-bottom:5px;">Stats (2-col)</div>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-icon"></div><div><div class="stat-val"></div><div class="stat-lbl"></div></div></div>
    <div class="stat-pill"><div class="stat-icon"></div><div><div class="stat-val"></div><div class="stat-lbl"></div></div></div>
    <div class="stat-pill"><div class="stat-icon"></div><div><div class="stat-val"></div><div class="stat-lbl"></div></div></div>
    <div class="stat-pill"><div class="stat-icon"></div><div><div class="stat-val"></div><div class="stat-lbl"></div></div></div>
  </div>

  <div class="label" style="margin-bottom:5px;">Tabs</div>
  <div class="tabs">
    <div class="tab active"></div>
    <div class="tab"></div>
    <div class="tab" style="margin-right:0;"></div>
  </div>

  <div class="day-label"></div>
  <div class="activity-item">
    <div class="act-icon"></div>
    <div><div class="act-name"></div><div class="act-time"></div></div>
    <div class="act-btn"></div>
  </div>
  <div class="activity-item">
    <div class="act-icon"></div>
    <div><div class="act-name" style="width:100px;"></div><div class="act-time"></div></div>
    <div class="act-btn"></div>
  </div>

  <div class="addition-wrap">
    <div class="addition-tag">Addition</div>
    <div class="annotation-text">Status badge — trip lifecycle<br>(State pattern: planning / active / completed)</div>
  </div>
  <div class="label" style="margin:14px 0 5px;">Trip info</div>
  <div class="card">
    <div class="card-heading"></div>
    <div class="info-row"><div class="info-key"></div><div class="info-val"></div></div>
    <div class="info-row"><div class="info-key"></div><div class="status-badge"></div></div>
    <div class="info-row" style="border:none;"><div class="info-key"></div><div class="info-val"></div></div>
  </div>

  <div class="addition-wrap">
    <div class="addition-tag">Addition</div>
    <div class="annotation-text">Live weather via Open-Meteo<br>(Adapter pattern — location editable inline)</div>
  </div>
  <div class="label" style="margin-bottom:5px;">Weather forecast (Adapter pattern)</div>
  <div class="card">
    <div class="weather-toggle">
      <div class="weather-title"></div>
      <div class="chevron"></div>
    </div>
    <div class="weather-row"><div class="wr-date"></div><div class="wr-summary"></div><div class="wr-temp"></div></div>
    <div class="weather-row"><div class="wr-date"></div><div class="wr-summary" style="width:64px;"></div><div class="wr-temp"></div></div>
  </div>

  <div class="label" style="margin-bottom:5px;">Budget tracker</div>
  <div class="card">
    <div class="card-heading"></div>
    <div class="budget-bar-bg"><div class="budget-bar-fill"></div></div>
    <div style="display:flex;justify-content:space-between;">
      <div style="width:50px;height:12px;background:#ccc;border-radius:3px;"></div>
      <div style="width:50px;height:12px;background:#ccc;border-radius:3px;"></div>
    </div>
  </div>
</div>
</body>
</html>
