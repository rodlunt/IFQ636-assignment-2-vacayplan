name: CI/CD Pipeline

# Mirrors the structure prescribed in IFQ636 Activity 3.11 (CI/CD Workflow configuration
# for test automation). Single self-hosted job runs build + test + deploy on the EC2
# instance. Documented deviations from the unit template:
#   1. The unit template prints secrets to logs ("echo Secret 1 is: $MONGO_URI"); that
#      step is omitted here because Actions logs are publicly viewable and leaking
#      production credentials is unacceptable.
#   2. Added yarn-audit gates (both advisory). Backend was initially blocking on
#      high severity but softened to advisory after the existing transitive deps
#      tripped it; vulnerabilities still surface in the workflow log for review.
#   3. Frontend build uses REACT_APP_API_URL set inline at build time rather than the
#      unit template's hardcoded baseURL in axiosConfig.jsx (Decision F4 in the project
#      report notes). Update the URL below if the EC2 EIP changes.

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Build, test, deploy
    runs-on: self-hosted
    strategy:
      matrix:
        node-version: [22]
    environment: MONGO_URI

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Stop running PM2 services
        run: pm2 stop all

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          npm install --global yarn
          yarn --version
          yarn install

      - name: Backend security audit (high severity, advisory)
        working-directory: ./backend
        run: yarn audit --level high
        continue-on-error: true

      - name: Install frontend dependencies and build
        working-directory: ./frontend
        env:
          REACT_APP_API_URL: http://3.106.8.108
        run: |
          df -h
          sudo rm -rf ./build
          yarn install
          yarn run build

      - name: Frontend security audit (high severity, advisory)
        working-directory: ./frontend
        run: yarn audit --level high
        continue-on-error: true

      - name: Deploy frontend build to pm2-served path
        run: |
          rsync -a --delete frontend/build/ ~/vacationplan_IFQ636/frontend/build/
          ls -la ~/vacationplan_IFQ636/frontend/build/ | head -5

      - name: Run backend tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}
        working-directory: ./backend
        run: npm test

      - name: Install root dependencies
        run: npm ci

      - name: Deploy backend code to pm2-served path
        run: |
          rsync -a --delete \
            --exclude='node_modules/' \
            --exclude='.env' \
            backend/ ~/vacationplan_IFQ636/backend/
          ls -la ~/vacationplan_IFQ636/backend/ | head -10

      - name: Create production .env at pm2-served path from PROD secret
        run: |
          touch ~/vacationplan_IFQ636/backend/.env
          echo "${{ secrets.PROD }}" > ~/vacationplan_IFQ636/backend/.env

      - name: Install backend dependencies at pm2-served path
        working-directory: /home/ubuntu/vacationplan_IFQ636/backend
        run: yarn install

      - name: Sync nginx site config
        run: |
          sudo cp deploy/nginx-site.conf /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo nginx -s reload

      - name: Start and restart PM2 services
        run: |
          pm2 start all
          pm2 restart all

      - name: Seed users (marker + admin)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        working-directory: /home/ubuntu/vacationplan_IFQ636/backend
        run: npm run seed

      - name: Seed trips (marker)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        working-directory: /home/ubuntu/vacationplan_IFQ636/backend
        run: npm run seed:trips
